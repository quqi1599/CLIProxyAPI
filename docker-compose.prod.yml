services:
  cli-proxy-api:
    init: true
    image: ${CLIPROXY_IMAGE:?set CLIPROXY_IMAGE to an immutable sha-<12> image}
    pull_policy: always
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
      GOMEMLIMIT: ${CLIPROXY_GOMEMLIMIT:-6GiB}
      GOMAXPROCS: ${CLIPROXY_GOMAXPROCS:-4}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    mem_limit: ${CLIPROXY_MEMORY_LIMIT:-8g}
    memswap_limit: ${CLIPROXY_MEMORY_SWAP_LIMIT:-8g}
    cpus: ${CLIPROXY_CPUS:-4.0}
    pids_limit: ${CLIPROXY_PIDS_LIMIT:-1024}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8317/livez >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    stop_signal: SIGTERM
    stop_grace_period: 60s
    restart: unless-stopped
